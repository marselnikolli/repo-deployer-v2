<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo Deployer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 340px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    header svg { color: #2E90FA; flex-shrink: 0; }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
    }

    .badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      background: #1f6feb;
      color: #fff;
      padding: 2px 7px;
      border-radius: 99px;
    }

    section { padding: 14px; }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .url-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 12px;
      min-height: 38px;
    }

    .url-box span {
      flex: 1;
      word-break: break-all;
      color: #79c0ff;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px;
    }

    .url-box .not-github {
      color: #8b949e;
      font-family: inherit;
      font-size: 12px;
      font-style: italic;
    }

    .manual-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .manual-row input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e6edf3;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .manual-row input::placeholder { color: #484f58; }
    .manual-row input:focus { border-color: #1f6feb; }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #1f6feb;
      color: #fff;
      padding: 8px 14px;
    }

    .btn-primary:hover { background: #388bfd; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-import {
      width: 100%;
      background: #238636;
      color: #fff;
      padding: 9px;
      margin-bottom: 8px;
    }

    .btn-import:hover { background: #2ea043; }
    .btn-import:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
      padding: 7px;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .btn-secondary:hover { background: #161b22; color: #e6edf3; }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .status.success { background: #0d2b1a; color: #3fb950; border: 1px solid #238636; }
    .status.error   { background: #2d1215; color: #f85149; border: 1px solid #6e2c31; }
    .status.info    { background: #0d1f3b; color: #79c0ff; border: 1px solid #1f6feb; }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .settings-row input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e6edf3;
      font-size: 12px;
      outline: none;
    }

    .settings-row input:focus { border-color: #1f6feb; }

    footer {
      padding: 8px 14px;
      border-top: 1px solid #21262d;
      font-size: 10px;
      color: #484f58;
      text-align: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 10px 0;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
      <path d="M9 18c-4.51 2-5-2-7-2"/>
    </svg>
    <h1>Repo Deployer</h1>
    <span class="badge">Extension</span>
  </header>

  <section>
    <!-- Detected URL -->
    <div class="label">Detected Repository</div>
    <div class="url-box">
      <span id="detected-url" class="not-github">No GitHub repo detected on this tab</span>
    </div>

    <!-- Status message -->
    <div id="status" style="display:none"></div>

    <!-- Import detected URL -->
    <button id="btn-import" class="btn-import" disabled>
      Import Detected Repository
    </button>

    <hr class="divider" />

    <!-- Manual URL entry -->
    <div class="label">Or Enter URL Manually</div>
    <div class="manual-row">
      <input id="manual-url" type="url" placeholder="https://github.com/owner/repo" />
      <button id="btn-manual" class="btn-primary">Import</button>
    </div>

    <hr class="divider" />

    <!-- Settings -->
    <div class="label">App URL</div>
    <div class="settings-row">
      <input id="app-url" type="url" placeholder="http://localhost:3000" />
      <button id="btn-save" class="btn-primary" style="white-space:nowrap">Save</button>
    </div>
  </section>

  <footer>Repo Deployer v1.0 · <a href="#" id="open-app" style="color:#1f6feb;text-decoration:none">Open App</a></footer>

  <script src="popup.js"></script>
</body>
</html>
