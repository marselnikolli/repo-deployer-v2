worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Basic rate limiting — 30 req/s per IP on API, 100 req/s on frontend
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket endpoint — must come before the /api/ block
        location = /api/ws {
            proxy_pass http://api:8000/api/ws;
            proxy_read_timeout 3600s;  # keep WS connections alive
        }

        # API traffic
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://api:8000/api/;
            proxy_read_timeout 120s;
        }

        # OpenAPI / docs
        location ~ ^/api/(docs|redoc|openapi.json) {
            proxy_pass http://api:8000;
        }

        # Frontend — everything else
        location / {
            limit_req zone=frontend burst=200 nodelay;
            proxy_pass http://frontend:3000/;
            proxy_read_timeout 30s;
        }
    }

    # Variable for Connection header upgrade handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
